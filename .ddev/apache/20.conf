<VirtualHost *:80>
    ServerName sub.typo3-backend-themes.ddev.site
    ServerAlias *.typo3-backend-themes.ddev.site
    DocumentRoot /var/www/html/.Build

    RewriteEngine On
    RewriteCond %{HTTP_HOST} ^([0-9]+)\.typo3-backend-themes\.ddev\.site$
    RewriteRule ^/(.*)$ /.Build/%1/public/$1 [L]

    <Directory /var/www/html/.Build>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
</VirtualHost>

<VirtualHost *:443>
    ServerName sub.typo3-backend-themes.ddev.site
    ServerAlias *.typo3-backend-themes.ddev.site
    DocumentRoot /var/www/html/.Build

    SSLEngine on
    SSLCertificateFile /etc/ssl/certs/master.crt
    SSLCertificateKeyFile /etc/ssl/certs/master.key

    RewriteEngine On
    RewriteCond %{HTTP_HOST} ^([0-9]+)\.typo3-backend-themes\.ddev\.site$
    RewriteRule ^/(.*)$ /.Build/%1/public/$1 [L]

    <Directory /var/www/html/.Build>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>
</VirtualHost>
